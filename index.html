<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign-OS Documentation (Open Design Bento UI)</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

        :root {
            /* Open Design Tokens from MASTER.md */
            --color-primary: #1E293B;
            --color-on-primary: #FFFFFF;
            --color-secondary: #334155;
            --color-accent: #22C55E;
            --color-background: #0F172A;
            --color-foreground: #F8FAFC;
            --color-muted: #272F42;
            --color-border: #475569;
            --color-destructive: #EF4444;
            --color-ring: #1E293B;
            
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;
            --space-3xl: 4rem;

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px rgba(0,0,0,0.15);
            
            --font-heading: 'JetBrains Mono', monospace;
            --font-body: 'IBM Plex Sans', sans-serif;
            
            /* Additional Variables for Bento Grid */
            --toc-width: 320px;
            --panel-max-width: 1000px; /* reading width constraint */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-foreground);
            font-family: var(--font-body);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden; /* App-like feel, scrollable within zones */
        }
        
        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            color: var(--color-on-primary);
            margin-top: 2em;
            margin-bottom: 1em;
            font-weight: 600;
        }
        
        h1 { font-size: 2.25rem; margin-top: 0; color: var(--color-accent); }
        h2 { font-size: 1.875rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.5rem; }
        h3 { font-size: 1.5rem; }
        
        p, ul, ol, blockquote, pre {
            margin-bottom: 1.5em;
        }
        
        a {
            color: var(--color-accent);
            text-decoration: none;
            transition: opacity 200ms ease;
        }
        
        a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Sidebar (TOC) */
        #sidebar {
            width: var(--toc-width);
            min-width: var(--toc-width);
            height: 100%;
            background-color: var(--color-background);
            border-right: 1px solid var(--color-border);
            padding: var(--space-xl);
            overflow-y: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            z-index: 10;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--color-foreground);
        }
        
        .brand-header i {
            color: var(--color-accent);
        }

        .toc-link {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) var(--space-md);
            color: var(--color-foreground);
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 200ms ease;
            text-decoration: none;
            border-left: 2px solid transparent;
        }

        .toc-link i[data-lucide] {
            width: 18px;
            height: 18px;
            opacity: 0.7;
            transition: opacity 200ms ease;
        }

        .toc-link:hover, .toc-link.active {
            background-color: var(--color-primary);
            color: var(--color-on-primary);
            text-decoration: none;
            transform: translateX(4px);
            border-left-color: var(--color-accent);
        }
        
        .toc-link:hover i[data-lucide], .toc-link.active i[data-lucide] {
            opacity: 1;
            color: var(--color-accent);
        }

        /* Main Content Area */
        #main-content {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto;
            padding: var(--space-2xl);
            scroll-behavior: smooth;
        }
        
        /* Bento Grid Wrapper */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(800px, 1fr));
            gap: var(--space-2xl);
            align-items: start;
            max-width: 100%;
            margin: 0 auto;
        }

        /* Dashboard Panel / Card */
        .bento-panel {
            background-color: var(--color-primary);
            border-radius: 16px;
            padding: var(--space-3xl);
            box-shadow: var(--shadow-md);
            transition: all 300ms ease;
            border: 1px solid var(--color-muted);
            /* Max width constraint for readability */
            max-width: var(--panel-max-width);
            margin: 0 auto;
            width: 100%;
            
            /* Open Design animation properties */
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUpIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .bento-panel:hover {
            box-shadow: var(--shadow-xl);
            border-color: var(--color-border);
        }

        @keyframes fadeUpIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Elements Styling */
        .markdown-body {
            font-size: 1.05rem;
            color: var(--color-foreground);
        }
        
        .markdown-body pre {
            background-color: var(--color-background);
            padding: var(--space-lg);
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--color-border);
            font-family: var(--font-heading);
            font-size: 0.9rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }

        .markdown-body code {
            background-color: var(--color-background);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: var(--font-heading);
            font-size: 0.9em;
            color: var(--color-accent); 
        }
        
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--color-accent);
            padding-left: var(--space-lg);
            margin-left: 0;
            color: #94A3B8;
            font-style: italic;
            background-color: rgba(34, 197, 94, 0.05); /* accent with opacity */
            padding: var(--space-lg);
            border-radius: 0 12px 12px 0;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: var(--space-lg);
            background-color: var(--color-background);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
        }

        .markdown-body th, .markdown-body td {
            border-bottom: 1px solid var(--color-border);
            border-right: 1px solid var(--color-border);
            padding: var(--space-md) var(--space-lg);
            text-align: left;
        }

        .markdown-body th:last-child, .markdown-body td:last-child {
            border-right: none;
        }
        
        .markdown-body tr:last-child td {
            border-bottom: none;
        }

        .markdown-body th {
            background-color: var(--color-secondary);
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--color-on-primary);
        }
        
        .markdown-body img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            margin: var(--space-lg) 0;
            border: 1px solid var(--color-border);
        }

        /* Header link anchors */
        .header-anchor {
            float: left;
            margin-left: -20px;
            padding-right: 4px;
            opacity: 0;
            text-decoration: none;
            color: var(--color-muted);
            transition: opacity 0.2s;
        }
        
        h1:hover .header-anchor, 
        h2:hover .header-anchor, 
        h3:hover .header-anchor {
            opacity: 1;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 1024px) {
            body {
                flex-direction: column;
                overflow: auto; 
            }
            #sidebar {
                width: 100%;
                height: auto;
                min-height: auto;
                border-right: none;
                border-bottom: 1px solid var(--color-border);
                position: sticky;
                top: 0;
                z-index: 100;
                padding: var(--space-md);
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: var(--space-sm);
            }
            .brand-header { margin-bottom: 0; margin-right: var(--space-md); }
            #main-content {
                height: auto;
                overflow: visible;
                padding: var(--space-md);
            }
            .bento-grid {
                grid-template-columns: 1fr;
            }
            .bento-panel {
                padding: var(--space-xl);
            }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="brand-header">
            <i data-lucide="terminal-square"></i>
            Sovereign-OS
        </div>
        <div id="toc-container">
            <!-- Dynamic TOC links will go here -->
        </div>
    </nav>
    
    <main id="main-content">
        <div class="bento-grid" id="documents-container">
            <!-- Dynamic Panels will go here -->
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Setup Marked options (for github flavored markdown, tables, etc)
        marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: true,
        });

        // Add a global spin animation to CSS for loading states
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
            .lucide-spin {
                animation: spin 2s linear infinite;
            }
            .loading-text {
                display: flex;
                align-items: center;
                gap: 12px;
                color: var(--color-accent);
                font-family: var(--font-heading);
            }
        `;
        document.head.appendChild(style);

        const DOCUMENTS = [
            { 
                id: 'readme', 
                title: 'Introduction', 
                icon: 'book-open', 
                path: 'skills/ponytail/README.md' 
            },
            { 
                id: 'skill', 
                title: 'Architecture & Rules', 
                icon: 'cpu', 
                path: 'skills/ponytail/SKILL.md' 
            },
            { 
                id: 'module-no-mistakes', 
                title: 'No-Mistakes Framework', 
                icon: 'shield-check', 
                path: 'skills/ponytail/modules/no-mistakes/README.md' 
            },
            { 
                id: 'module-codebase-memory', 
                title: 'Codebase Memory MCP', 
                icon: 'network', 
                path: 'skills/ponytail/modules/codebase-memory-mcp/README.md' 
            }
        ];

        async function fetchMarkdown(path) {
            try {
                // Ensure correct relative paths, since index.html is in C:\Skills
                const response = await fetch(path);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.text();
            } catch (error) {
                console.error(`Error fetching ${path}:`, error);
                return `> **Error loading document**: \`${path}\`\n\n${error.message}`;
            }
        }

        async function renderDocuments() {
            const tocContainer = document.getElementById('toc-container');
            const docsContainer = document.getElementById('documents-container');
            
            for (let i = 0; i < DOCUMENTS.length; i++) {
                const doc = DOCUMENTS[i];
                
                // Add TOC item
                const tocItem = document.createElement('a');
                tocItem.className = 'toc-link';
                tocItem.href = `#panel-${doc.id}`;
                tocItem.innerHTML = `<i data-lucide="${doc.icon}"></i> <span>${doc.title}</span>`;
                
                // Add IntersectionObserver click handler for TOC
                tocItem.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.getElementById(`panel-${doc.id}`).scrollIntoView({ behavior: 'smooth' });
                    // manual active class update just for instant feedback
                    document.querySelectorAll('.toc-link').forEach(link => link.classList.remove('active'));
                    tocItem.classList.add('active');
                });
                tocContainer.appendChild(tocItem);
                
                // Create Panel
                const panel = document.createElement('article');
                panel.className = 'bento-panel';
                panel.id = `panel-${doc.id}`;
                
                // Add animation delay for stagger
                panel.style.animationDelay = `${i * 0.15}s`;

                // Add loading state
                panel.innerHTML = `<div class="markdown-body">
                    <h3 class="loading-text">
                        <i data-lucide="loader-2" class="lucide-spin"></i> Loading ${doc.title}...
                    </h3>
                </div>`;
                docsContainer.appendChild(panel);
            }
            
            // Render icons for loaders first
            lucide.createIcons();
            
            // Setup observer right away
            setupScrollSpy();
            
            // Now load content (can do in parallel for speed)
            await Promise.all(DOCUMENTS.map(async (doc) => {
                const mdContent = await fetchMarkdown(doc.path);
                const htmlContent = marked.parse(mdContent);
                const cleanHtml = DOMPurify.sanitize(htmlContent);
                
                const panel = document.getElementById(`panel-${doc.id}`);
                panel.innerHTML = `<div class="markdown-body">${cleanHtml}</div>`;
            }));
            
            // One final icon pass for any icons inside the markdown
            lucide.createIcons();
        }

        function setupScrollSpy() {
            const panels = document.querySelectorAll('.bento-panel');
            const tocLinks = document.querySelectorAll('.toc-link');
            
            // Set up a scroll observer to highlight the TOC based on what panel is mostly in view
            const observerOptions = {
                root: document.getElementById('main-content'),
                rootMargin: '-10% 0px -80% 0px', // triggers when top of panel hits 10% from top
                threshold: 0
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        tocLinks.forEach(link => {
                            if (link.getAttribute('href') === `#${id}`) {
                                link.classList.add('active');
                            } else {
                                link.classList.remove('active');
                            }
                        });
                    }
                });
            }, observerOptions);
            
            panels.forEach(panel => observer.observe(panel));
        }

        // Run
        renderDocuments();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign OS | Documentation</title>
    <meta name="description" content="A personal automation framework that governs how AI coding agents operate across workspaces.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --sidebar-bg: rgba(20, 20, 20, 0.8);
            --text-main: #f0f0f0;
            --text-muted: #888;
            --accent-primary: #6c5ce7;
            --accent-secondary: #a29bfe;
            --glass-border: rgba(255, 255, 255, 0.05);
            --content-bg: rgba(10, 10, 10, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Ambient Background */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 50%;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(108, 92, 231, 0.15) 0%, rgba(5,5,5,0) 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* Layout */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 2rem 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 2rem;
            margin-bottom: 2rem;
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a29bfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.3);
            color: var(--accent-secondary);
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .nav-list {
            list-style: none;
            padding: 0 1rem;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: block;
            padding: 0.8rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-link.active {
            background: rgba(108, 92, 231, 0.15);
            color: var(--accent-secondary);
            border: 1px solid rgba(108, 92, 231, 0.2);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 4rem;
            background: var(--content-bg);
            scroll-behavior: smooth;
        }

        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Styling */
        .markdown-body {
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
        }
        
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .markdown-body h1 {
            font-size: 2.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .markdown-body h2 { font-size: 1.8rem; }
        
        .markdown-body p { margin-bottom: 1.2rem; }
        
        .markdown-body a {
            color: var(--accent-secondary);
            text-decoration: none;
        }
        
        .markdown-body a:hover { text-decoration: underline; }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.08);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .markdown-body pre {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .markdown-body pre code {
            background: none;
            padding: 0;
            color: #d4d4d4;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent-primary);
            padding-left: 1rem;
            margin-left: 0;
            color: var(--text-muted);
            background: rgba(108, 92, 231, 0.05);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 2rem;
            margin-bottom: 1.5rem;
        }

        .markdown-body li { margin-bottom: 0.5rem; }

        .markdown-body hr {
            border: 0;
            height: 1px;
            background: var(--glass-border);
            margin: 2rem 0;
        }
        
        /* Loader */
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            animation: spin 1s ease-in-out infinite;
            margin: 100px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Sovereign OS</h2>
                <div class="badge">v15.0.2-Pure</div>
            </div>
            <ul class="nav-list" id="nav-list">
                <!-- Navigation inserted by JS -->
            </ul>
        </aside>

        <main class="main-content">
            <div id="loader" class="loader"></div>
            <div class="content-wrapper">
                <div id="content" class="markdown-body">
                    <!-- Markdown rendered here -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const REPO_RAW_BASE = 'https://raw.githubusercontent.com/tejaswin-amara/Sovereign-OS/main/';
        
        const documents = [
            { id: 'readme', path: 'README.md', title: 'Home / Overview' },
            { id: 'core', path: 'SOVEREIGN_CORE.md', title: 'Sovereign Core' },
            { id: 'audit', path: 'AUDIT_LEDGER.md', title: 'Audit Ledger' },
            { id: 'mistakes', path: 'MISTAKES_LEDGER.md', title: 'Mistakes Ledger' },
            { id: 'ponytail', path: 'skills/ponytail/SKILL.md', title: 'Skill: Ponytail' },
            { id: 'omni', path: 'skills/omni-discovery/SKILL.md', title: 'Skill: Omni Discovery' }
        ];

        const navList = document.getElementById('nav-list');
        const contentDiv = document.getElementById('content');
        const loader = document.getElementById('loader');

        // Initialize Navigation
        function initNav() {
            documents.forEach(doc => {
                const li = document.createElement('li');
                li.className = 'nav-item';
                
                const a = document.createElement('a');
                a.className = 'nav-link';
                a.textContent = doc.title;
                a.dataset.id = doc.id;
                
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadDocument(doc.id);
                });
                
                li.appendChild(a);
                navList.appendChild(li);
            });
        }

        // Load a specific document
        async function loadDocument(docId) {
            // Update URL hash
            window.location.hash = docId;
            
            // Update Active State
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            const activeLink = document.querySelector(`.nav-link[data-id="${docId}"]`);
            if(activeLink) activeLink.classList.add('active');

            const docConfig = documents.find(d => d.id === docId) || documents[0];
            
            contentDiv.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(REPO_RAW_BASE + docConfig.path);
                if (!response.ok) throw new Error('Failed to fetch document');
                
                const markdown = await response.text();
                
                // Configure marked to handle Github Flavored Markdown
                marked.setOptions({
                    gfm: true,
                    breaks: true
                });

                const rawHtml = marked.parse(markdown);
                const safeHtml = DOMPurify.sanitize(rawHtml);
                
                contentDiv.innerHTML = safeHtml;
                
                // Re-trigger fade animation
                contentDiv.parentElement.style.animation = 'none';
                contentDiv.parentElement.offsetHeight; /* trigger reflow */
                contentDiv.parentElement.style.animation = null;
                
            } catch (error) {
                contentDiv.innerHTML = `
                    <div style="color: #ff5f56; padding: 2rem; background: rgba(255,95,86,0.1); border-radius: 8px;">
                        <h2>Error loading document</h2>
                        <p>${error.message}</p>
                    </div>`;
            } finally {
                loader.style.display = 'none';
            }
        }

        // Initialization
        window.addEventListener('DOMContentLoaded', () => {
            initNav();
            
            // Read hash from URL to load initial page, or default to readme
            const hash = window.location.hash.replace('#', '');
            const initialDoc = documents.find(d => d.id === hash) ? hash : 'readme';
            loadDocument(initialDoc);
        });
    </script>
</body>
</html>

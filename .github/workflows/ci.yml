name: Sovereign OS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up PowerShell
      uses: actions/setup-powershell@v2

    - name: Install Pester
      shell: pwsh
      run: |
        Install-Module -Name Pester -Force -SkipPublisherCheck -AcceptLicense
        Import-Module Pester -PassThru

    - name: Run Sovereign Tests
      shell: pwsh
      run: |
        $Tests = @(
            "agent-bootstrap/tests/Helpers.Tests.ps1",
            "agent-bootstrap/tests/RemediationVerify.Tests.ps1"
        )
        Invoke-Pester -Path $Tests -Output Detailed
        
    - name: Run Harvester Empirical Tests
      shell: pwsh
      run: |
        ./run_harvester_tests.ps1

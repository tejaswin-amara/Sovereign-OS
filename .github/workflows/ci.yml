name: Sovereign OS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Pester
      shell: pwsh
      run: |
        Install-Module -Name Pester -Force -SkipPublisherCheck -AcceptLicense
        Import-Module Pester -PassThru

    - name: Run Sovereign Tests
      shell: pwsh
      run: |
        Invoke-Pester -Path agent-bootstrap/tests/Helpers.Tests.ps1 -Output Detailed

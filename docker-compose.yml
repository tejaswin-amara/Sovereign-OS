
services:
  sovereign-os:
    build: .
    container_name: sovereign-os
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - .:/opt/sovereign
    depends_on:
      ollama:
        condition: service_healthy
    command: pwsh -File sovereign.ps1

  ollama:
    image: ollama/ollama:latest
    container_name: sovereign-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
